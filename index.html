<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LevelUpMe | RPG Life Manager</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen" class="modal-overlay" style="display: flex; flex-direction: column; background: var(--bg-dark); z-index: 9999;">
        <div class="modal-box" style="text-align: center;">
            <h2 style="color: var(--accent); margin-bottom: 20px;"><i class="fas fa-user-shield"></i> LevelUpMe Login</h2>
            <input type="email" id="login-email" placeholder="Email (Contoh: roy@mail.com)">
            <input type="password" id="login-password" placeholder="Password (Minimal 6 karakter)">
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="handleLogin()" class="btn-save" style="flex: 1;">Login</button>
                <button onclick="handleRegister()" class="btn-cancel" style="flex: 1;">Daftar Akun</button>
            </div>
            <p id="login-error" style="color: var(--red-low); font-size: 0.8rem; margin-top: 10px;"></p>
        </div>
    </div>

    <header class="game-header">
        <div class="user-brief">
            <span class="lv-badge">Lv. <span id="top-lv">1</span></span>
            <span class="user-name">ROY ARI</span>
        </div>
        <div class="currency-brief">
            <div class="coin-wrap">
                <i class="fas fa-coins"></i>
                <span id="top-coins">0</span>
            </div>
        </div>
    </header>

    <main id="app-content">
        
        <section id="tab-status" class="tab-panel">
            <div class="profile-section">
                <div class="avatar-box">
                    <img src="logo.jpg" alt="Avatar" id="player-avatar">
                </div>
                <div class="exp-container">
                    <div class="exp-label">
                        <span>EXP</span>
                        <span id="exp-val">0 / 100</span>
                    </div>
                    <div class="exp-bar"><div id="exp-fill" style="width: 0%;"></div></div>
                </div>
            </div>

            <div class="attributes-grid">
                <div class="attr-card">
                    <i class="fas fa-brain"></i>
                    <span>INT</span>
                    <strong id="stat-int">0</strong>
                    <button onclick="upgradeStat('int')">+</button>
                </div>
                <div class="attr-card">
                    <i class="fas fa-dumbbell"></i>
                    <span>FIT</span>
                    <strong id="stat-fit">0</strong>
                    <button onclick="upgradeStat('fit')">+</button>
                </div>
                <div class="attr-card">
                    <i class="fas fa-users"></i>
                    <span>LEAD</span>
                    <strong id="stat-lead">0</strong>
                    <button onclick="upgradeStat('lead')">+</button>
                </div>
                <div class="attr-card">
                    <i class="fas fa-palette"></i>
                    <span>CRE</span>
                    <strong id="stat-cre">0</strong>
                    <button onclick="upgradeStat('cre')">+</button>
                </div>
            </div>
            <p class="sp-info">Skill Points: <span id="skill-points">0</span></p>
        </section>

        <section id="tab-misi" class="tab-panel active">
            <div class="calendar-card">
                <div class="cal-nav">
                    <button id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                    <h3 id="monthDisplay">Maret 2026</h3>
                    <button id="nextMonth"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div id="calendar-grid" class="calendar-grid">
                    </div>
            </div>

            <div class="quest-controls">
            <div class="view-toggle">
                <button class="toggle-btn active" id="btn-active-quest" onclick="showSubTabMisi('active')">Active</button>
                <button class="toggle-btn" id="btn-history-quest" onclick="showSubTabMisi('history')">History</button>
            </div>
                <button class="add-btn" onclick="openModal('misi')"><i class="fas fa-plus"></i></button>
            </div>

            <div id="quest-container">
                </div>
        </section>

        <section id="tab-shop" class="tab-panel">
            <div class="shop-header">
                <h2><i class="fas fa-shopping-cart"></i> Wishlist Shop</h2>
                <button class="add-btn" onclick="openModal('shop')"><i class="fas fa-plus"></i></button>
            </div>
            <div class="shop-toggle">
                <button class="toggle-btn active" id="btn-wishlist" onclick="showSubTabShop('items')">Items</button>
                <button class="toggle-btn" id="btn-bought" onclick="showSubTabShop('bought')">History</button>
            </div>
            <div id="shop-container">
                </div>
        </section>

    </main>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="changeTab('tab-status')">
            <i class="fas fa-user-ninja"></i>
            <span>Status</span>
        </div>
        <div class="nav-item active" onclick="changeTab('tab-misi')">
            <i class="fas fa-khanda"></i>
            <span>Misi</span>
        </div>
        <div class="nav-item" onclick="changeTab('tab-shop')">
            <i class="fas fa-gem"></i>
            <span>Wishlist</span>
        </div>
    </nav>

    <div id="modal-overlay" class="modal-hidden">
        <div class="modal-box">
            <h3 id="modal-title">Buat Misi Baru</h3>
            <div id="modal-form">
                </div>
            <div class="modal-btns">
                <button onclick="closeModal()" class="btn-cancel">Batal</button>
                <button id="btn-save" class="btn-save">Simpan</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
